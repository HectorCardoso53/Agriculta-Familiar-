<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="img/prefeitura.png">
  <title>PNAE — Entrar</title>

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/buttons.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/utils.css">
  <link rel="stylesheet" href="css/login.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <style>
    /* Painel de cadastro — oculto por padrão */
    #painel-cadastro {
      display: none;
    }

    /* Animação de transição suave entre painéis */
    #painel-login,
    #painel-cadastro {
      animation: fadeIn .2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body class="login-page">

  <div class="login-wrap">
    <div class="login-card">

      <!-- Cabeçalho verde -->
      <div class="login-card-top">
        <div class="login-logo">
          <img src="img/prefeitura.png" alt="Prefeitura">
        </div>
        <div class="login-logo">Sistema</div>
        <div class="login-title">PNAE ORIXIMINÁ</div>
        <div class="login-subtitle">Programa Nacional de Alimentação Escolar</div>
      </div>

      <!-- ══════════════════════════════════════
           PAINEL: LOGIN
      ══════════════════════════════════════ -->
      <div class="login-body" id="painel-login">

        <div class="login-error" id="login-error"></div>

        <div class="form-group">
          <label>E-mail</label>
          <div class="input-icon-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
              <polyline points="22,6 12,13 2,6" />
            </svg>
            <input id="email" type="email" placeholder="seu@email.com" autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label>Senha</label>
          <div class="input-icon-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input id="senha" type="password" placeholder="••••••••" autocomplete="current-password">
          </div>
          <div style="text-align:right;margin-top:4px">
            <a href="#" onclick="recuperarSenha()" style="font-size:12px;color:var(--green);text-decoration:none">
              Esqueceu a senha?
            </a>
          </div>
        </div>

        <button class="btn btn-primary btn-full btn-lg" id="btn-entrar" onclick="entrarEmail()">
          <div class="btn-spinner" id="spinner-email"></div>
          <span class="btn-text">Entrar</span>
        </button>

        <div class="login-links">
          Não tem conta? <a href="#" onclick="mostrarCadastro()">Criar conta</a>
        </div>
      </div><!-- /painel-login -->

      <!-- ══════════════════════════════════════
           PAINEL: CADASTRO
      ══════════════════════════════════════ -->
      <div class="login-body" id="painel-cadastro">

        <div class="login-error" id="cadastro-error"></div>

        <div class="form-group">
          <label>Nome completo</label>
          <div class="input-icon-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <input id="cad-nome" type="text" placeholder="Seu nome completo" autocomplete="name">
          </div>
        </div>

        <div class="form-group">
          <label>E-mail</label>
          <div class="input-icon-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
              <polyline points="22,6 12,13 2,6" />
            </svg>
            <input id="cad-email" type="email" placeholder="seu@email.com" autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label>Senha</label>
          <div class="input-icon-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input id="cad-senha" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
          </div>
        </div>

        <div class="form-group">
          <label>Confirmar senha</label>
          <div class="input-icon-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input id="cad-senha2" type="password" placeholder="Repita a senha" autocomplete="new-password">
          </div>
        </div>

        <button class="btn btn-primary btn-full btn-lg" id="btn-cadastrar" onclick="cadastrar()">
          <div class="btn-spinner" id="spinner-cad"></div>
          <span class="btn-text">Criar conta</span>
        </button>


        <div class="login-links">
          Já tem conta? <a href="#" onclick="mostrarLogin()">Entrar</a>
        </div>

      </div><!-- /painel-cadastro -->

    </div><!-- /login-card -->

    <p style="text-align:center;font-size:11px;color:var(--muted);margin-top:16px">
      Desenvolvido pela Secretaria Municipal de Eficiência Governamental Oriximiná - SEMEG
    </p>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAgSU0rM0KmOy5-nilSCivSuIRJbD4sZ5k",
      authDomain: "semed-2f097.firebaseapp.com",
      projectId: "semed-2f097",
      storageBucket: "semed-2f097.firebasestorage.app",
      messagingSenderId: "695866916407",
      appId: "1:695866916407:web:d50b7e30a43121898c89b2",
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    auth.onAuthStateChanged(user => { if (user) window.location.href = 'index.html'; });

    // ── Alternar painéis ──────────────────────
    function mostrarCadastro() {
      document.getElementById('painel-login').style.display = 'none';
      const cad = document.getElementById('painel-cadastro');
      cad.style.display = 'block';
      cad.style.animation = 'none';
      void cad.offsetWidth; // força reflow para re-disparar animation
      cad.style.animation = '';
      esconderErroCad();
    }

    function mostrarLogin() {
      document.getElementById('painel-cadastro').style.display = 'none';
      const login = document.getElementById('painel-login');
      login.style.display = 'block';
      login.style.animation = 'none';
      void login.offsetWidth;
      login.style.animation = '';
      esconderErro();
    }

    // ── Login com e-mail e senha ──────────────
    async function entrarEmail() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      if (!email || !senha) { mostrarErro('Preencha e-mail e senha.'); return; }
      setLoading('btn-entrar', 'spinner-email', true);
      esconderErro();
      try {
        await auth.signInWithEmailAndPassword(email, senha);
      } catch (e) {
        setLoading('btn-entrar', 'spinner-email', false);
        mostrarErro(traduzirErro(e.code));
      }
    }

    document.getElementById('senha').addEventListener('keydown', e => {
      if (e.key === 'Enter') entrarEmail();
    });



    // ── Cadastro ──────────────────────────────
    async function cadastrar() {
      const nome = document.getElementById('cad-nome').value.trim();
      const email = document.getElementById('cad-email').value.trim();
      const senha = document.getElementById('cad-senha').value;
      const senha2 = document.getElementById('cad-senha2').value;

      if (!nome || !email || !senha) { mostrarErroCad('Preencha todos os campos.'); return; }
      if (senha !== senha2) { mostrarErroCad('As senhas não coincidem.'); return; }
      if (senha.length < 6) { mostrarErroCad('A senha deve ter ao menos 6 caracteres.'); return; }

      setLoading('btn-cadastrar', 'spinner-cad', true);
      esconderErroCad();
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, senha);
        await cred.user.updateProfile({ displayName: nome });
        mostrarLogin();
        showToast('Conta criada com sucesso!');
      } catch (e) {
        setLoading('btn-cadastrar', 'spinner-cad', false);
        mostrarErroCad(traduzirErro(e.code));
      }
    }

    // ── Recuperação de senha ──────────────────
    async function recuperarSenha() {
      const email = document.getElementById('email').value.trim();
      if (!email) { mostrarErro('Digite seu e-mail acima primeiro.'); return; }

      const btn = document.getElementById('btn-entrar');
      if (btn) btn.disabled = true;

      try {
        await auth.sendPasswordResetEmail(email, {
          url: window.location.origin + '/login.html', // redireciona para login após redefinir
          handleCodeInApp: false,
        });
        esconderErro();
        showToast('E-mail de recuperação enviado! Verifique sua caixa de entrada.');
      } catch (e) {
        mostrarErro(traduzirErro(e.code));
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    // ── Helpers de UI ─────────────────────────
    function mostrarErro(msg) { const el = document.getElementById('login-error'); el.textContent = msg; el.classList.add('show'); }
    function esconderErro() { document.getElementById('login-error').classList.remove('show'); }
    function mostrarErroCad(msg) { const el = document.getElementById('cadastro-error'); el.textContent = msg; el.classList.add('show'); }
    function esconderErroCad() { document.getElementById('cadastro-error').classList.remove('show'); }

    function setLoading(btnId, spinnerId, loading) {
      const btn = document.getElementById(btnId);
      if (loading) btn.classList.add('loading'); else btn.classList.remove('loading');
    }

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3000);
    }

    function traduzirErro(code) {
      const map = {
        'auth/user-not-found': 'Usuário não encontrado.',
        'auth/wrong-password': 'Senha incorreta.',
        'auth/invalid-email': 'E-mail inválido.',
        'auth/email-already-in-use': 'Este e-mail já está em uso.',
        'auth/weak-password': 'Senha muito fraca (mínimo 6 caracteres).',
        'auth/too-many-requests': 'Muitas tentativas. Aguarde alguns minutos.',
        'auth/network-request-failed': 'Falha de conexão. Verifique sua internet.',
        'auth/invalid-credential': 'E-mail ou senha incorretos.',
      };
      return map[code] || `Erro: ${code}`;
    }
  </script>
</body>

</html>
